name: Supply Chain Strategy

on:
  schedule:
    - cron: '30 13 * * *'  # UTC 13:30 = 北京时间 21:30
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行（不推送）'
        required: false
        default: false
        type: boolean

jobs:
  strategy-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tushare requests pandas python-dotenv

      - name: Create .env
        run: |
          cat > .env << EOF
          TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}
          BARK_KEY=${{ secrets.BARK_KEY }}
          BARK_SERVER=${{ secrets.BARK_SERVER }}
          LOG_LEVEL=INFO
          EOF

      - name: Run strategy
        run: python supply_chain_strategy_merged.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Save candidate pool changes
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          if [ -f candidate_pool.json ]; then
            git add candidate_pool.json
            if ! git diff --cached --quiet; then
              git commit -m "Auto: update candidate pool $(date -d '+8 hours' +%Y-%m-%d)"
              git push
            fi
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: '*.log'
          retention-days: 15

name: Diagnose 300024

on:
  workflow_dispatch:  # 手动触发

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install tushare pandas requests python-dotenv

      - name: Diagnose 300024
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python supply_chain_strategy_merged.py --diagnose
